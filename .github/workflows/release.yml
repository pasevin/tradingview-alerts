name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: pnpm install

      - name: Install dmgbuild
        run: pip3 install --break-system-packages dmgbuild ds_store pyobjc

      - name: Import Apple Developer certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $RUNNER_TEMP/certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          security find-identity -v -p codesigning $KEYCHAIN_PATH

      - name: Build universal macOS app (no DMG)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          cd apps/desktop
          SIGN_IDENTITY="${{ secrets.APPLE_SIGNING_IDENTITY }}"
          if [ -n "$SIGN_IDENTITY" ]; then
            export APPLE_SIGNING_IDENTITY="$SIGN_IDENTITY"
            export APPLE_ID="${{ secrets.APPLE_ID }}"
            export APPLE_PASSWORD="${{ secrets.APPLE_PASSWORD }}"
            export APPLE_TEAM_ID="${{ secrets.APPLE_TEAM_ID }}"
          fi
          # Build app + updater artifacts only — DMG is created separately with dmgbuild
          pnpm exec tauri build --target universal-apple-darwin

      - name: Create DMG with background using dmgbuild
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd apps/desktop/src-tauri
          APP="target/universal-apple-darwin/release/bundle/macos/TradingView Alerts.app"
          DMG_OUT="target/universal-apple-darwin/release/bundle/dmg/TradingView Alerts_${VERSION}_universal.dmg"
          mkdir -p "$(dirname "$DMG_OUT")"

          # Create dmgbuild settings on the fly
          cat > /tmp/dmgbuild_settings.py << 'PYEOF'
          import os

          app = os.environ['APP_PATH']
          volume_name = 'TradingView Alerts'
          format = 'UDBZ'

          # Symlink to /Applications
          files = [app]
          symlinks = {'Applications': '/Applications'}

          # Background image
          background = os.environ['BG_PATH']

          # Icon positions
          icon_locations = {
              'TradingView Alerts.app': (140, 110),
              'Applications': (380, 110),
          }

          # Window
          window_rect = ((200, 120), (540, 360))
          default_view = 'icon-view'
          show_icon_preview = True
          icon_size = 96
          text_size = 14

          # Hide extensions
          show_ext = False

          # Sign if identity available
          sign_identity = os.environ.get('APPLE_SIGNING_IDENTITY', '')
          PYEOF

          APP_PATH="$APP" BG_PATH="dmg-background.png" \
            dmgbuild -s /tmp/dmgbuild_settings.py "TradingView Alerts" "$DMG_OUT"

          # Sign the DMG if we have a signing identity
          SIGN_IDENTITY="${{ secrets.APPLE_SIGNING_IDENTITY }}"
          if [ -n "$SIGN_IDENTITY" ]; then
            codesign --sign "$SIGN_IDENTITY" "$DMG_OUT"
          fi

          ls -lh "$DMG_OUT"

      - name: Collect artifacts
        run: |
          mkdir -p dist-artifacts
          find apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg \
            -name "*.dmg" -exec cp {} dist-artifacts/ \;
          find apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos \
            -name "*.tar.gz" -exec cp {} dist-artifacts/ \;
          find apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos \
            -name "*.tar.gz.sig" -exec cp {} dist-artifacts/ \;
          # Rename any files with spaces to use dots (Tauri uses productName with space).
          # GitHub release asset URLs break on spaces — the updater can't download them.
          cd dist-artifacts
          for f in *\ *; do
            [ -e "$f" ] || continue
            mv "$f" "${f// /.}"
          done
          ls -lh

      - name: Generate latest.json
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          TGZ_FILE=$(find dist-artifacts -name "*.tar.gz" | head -1)
          TGZ_NAME=$(basename "$TGZ_FILE")
          SIG=$(cat dist-artifacts/*.tar.gz.sig)
          cat > dist-artifacts/latest.json <<EOF
          {
            "version": "$VERSION",
            "notes": "See https://github.com/${{ github.repository }}/releases/tag/v$VERSION",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-universal": {
                "url": "https://github.com/${{ github.repository }}/releases/download/v$VERSION/$TGZ_NAME",
                "signature": "$SIG"
              },
              "darwin-aarch64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/v$VERSION/$TGZ_NAME",
                "signature": "$SIG"
              },
              "darwin-x86_64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/v$VERSION/$TGZ_NAME",
                "signature": "$SIG"
              }
            }
          }
          EOF
          cat dist-artifacts/latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist-artifacts/*
          generate_release_notes: true
          draft: false
