name: ci

# Fast cross-platform gate: type-check + lint everything on every push/PR.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build --filter '@tvalert/protocol' --filter '@tvalert/core'
      - run: pnpm type-check
